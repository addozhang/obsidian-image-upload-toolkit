name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

env:
  PLUGIN_NAME: obsidian-publish-plugin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp dist/main.js dist/manifest.json ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}

      - name: Create or reuse release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Create release if it doesn't exist yet; skip if already present
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

          # Upload assets (--clobber overwrites if the asset name already exists)
          gh release upload "$TAG" \
            "${{ env.PLUGIN_NAME }}.zip#${PLUGIN_NAME}-${TAG}.zip" \
            dist/main.js \
            dist/manifest.json \
            src/styles.css \
            --clobber
