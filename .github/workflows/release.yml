name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/main.js
            dist/manifest.json
            src/styles.css

      - name: Create or reuse release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Create release if it doesn't exist yet; skip if already present
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

          # Upload only the assets that Obsidian's plugin reviewer scans.
          # See https://docs.obsidian.md/Plugins/Releasing/Submission+requirements+for+plugins
          gh release upload "$TAG" \
            dist/main.js \
            dist/manifest.json \
            src/styles.css \
            --clobber
